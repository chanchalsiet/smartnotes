<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Smart Notes</title>
  <link rel="stylesheet" href="/frontend/css/dashboard.css">
</head>
<body>
  <header>
    <h2>Welcome,</h2>
    <button id="logoutBtn">Logout</button>
  </header>

  <main>
    <form id="addNoteForm">
        <div class="add-note-container">
          <input type="text" id="noteTitle" class = "noteTitle" placeholder="Title" required />
        </div>
      <div class="add-note-container"><textarea id="newNote" placeholder="Write a new note..." required></textarea></div>
      <div class="add-note-container"><button id="addNote">Add Note</button></div
    </form>

    <div class="notes-container" id="notesList">
      <!-- Notes will be displayed here dynamically -->
    </div>
  </main>
  <script src="/frontend/js/dashboard.js"></script>
</body>
</html>
